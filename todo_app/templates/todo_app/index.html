{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="flex h-screen bg-gray-100" x-data="{ 
        activeCategory: {{ request.GET.category|default:'null' }}, 
        filter: '{{ request.GET.filter|default:"all" }}' }">
    <div class="w-64 bg-white shadow-lg p-5">
        <div class="flex items-center gap-2 mb-6">
            <img src="{% static 'images/logo.png' %}" alt="logo" class="w-6 h-6 object-contain">

            <h2 class="text-xl font-bold text-[#ff7e6b]">Todo</h2>
        </div>
        <div x-data="{ showInput: false, openCategories: true  }" class=" transition-all duration-200">
            <div class="flex justify-between cursor-pointer" @click="openCategories = !openCategories">
                <p class="text-gray-500 font-medium text-md mb-2">Categories</p>
                <button class="text-xs text-gray-400 hover:text-gray-600 transition">
                    <i class="fa-solid" :class="openCategories ? 'fa-chevron-up' : 'fa-chevron-down'">
                    </i>
                </button>
            </div>
            <div x-show="openCategories" x-transition class="max-h-[60vh] overflow-y-auto pr-1 scroll-smooth"
                id="category-list">
                {% for cat in categories %}
                {% include "todo_app/partials/category_item.html" %}
                {% endfor %}
            </div>
        </div>
    </div>
    <div class="flex-1 p-8 overflow-y-auto">
        <div x-data="{ open: false }">
            <div class="flex justify-between gap-3 mb-6">
                <h1 class="text-2xl font-bold text-[#333333]">All your tasks</h1>
                <button @click="open = true; $nextTick(() => $refs.title.focus())" class="bg-gradient-to-br from-[#ff7e6b] to-[#ffb199]
                    hover:shadow-lg hover:brightness-105
                    active:scale-[0.97] active:shadow-sm
                    text-white px-4 py-2 rounded-md text-sm transition">
                    + Add Task
                </button>
            </div>

            <div x-show="open" x-transition.opacity class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40"
                @click="open = false">
            </div>
            <div x-show="open" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 scale-95 translate-y-2"
                x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 scale-100"
                x-transition:leave-end="opacity-0 scale-95" class="fixed inset-0 flex items-center justify-center z-50">

                <div @click.outside="open = false" class="bg-white w-full max-w-md rounded-2xl shadow-xl p-6 space-y-5">
                    <div class="flex justify-between items-center">
                        <h2 class="text-lg font-semibold text-gray-800">Add Task</h2>
                        <button @click="open = false" class="text-gray-400 hover:text-gray-600 transition">
                            ✕
                        </button>
                    </div>

                        <form 
                            x-ref="form"
                            class="space-y-4"
                            hx-post="/add/"
                            hx-target="#task-container"
                            hx-swap="afterbegin"
                            hx-on::after-request="
                                const url = event.detail.pathInfo.requestPath;
                                if(event.detail.successful && url === '/add/'){
                                    this.reset();   
                                    open = false;
                                    window.dispatchEvent(new CustomEvent('show-toast', {
                                        detail: { message: 'Task added successfully ' }
                                    }));
                                }
                            "
                        >

                        {% csrf_token %}

                        <div x-data="{ showCategory: false }" @htmx:afterRequest="showCategory = false"
                            class="space-y-2">

                            <div class="flex items-center gap-2">

                                <select name="category" id="category-select"
                                    class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                    {% include "todo_app/partials/category_options.html" %}
                                </select>

                                <button type="button" @click="showCategory = !showCategory"
                                    class="text-[#ff7e6b] text-sm font-medium hover:underline">
                                    + New
                                </button>

                            </div>

                            <div x-show="showCategory" x-transition class="space-y-2">
                                <div class="flex items-center gap-2">
                                    <input type="text" name="new_category" id="new-category-input"
                                        placeholder="New category..."
                                        class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                                    <button type="button" hx-post="/add-category/" hx-target="#category-select"
                                        hx-swap="none" hx-include="#new-category-input" hx-indicator="#cat-loading"
                                        hx-on::after-request="
                                            if(event.detail.successful){
                                                window.dispatchEvent(new CustomEvent('show-toast', {
                                                    detail: { message: 'Category added' }
                                                }));
                                            }
                                        " @htmx:afterRequest="showCategory = false"
                                        class="bg-gradient-to-r from-[#ff7e6b] to-[#ffb199] text-white px-4 py-2 rounded-lg text-sm hover:transition">
                                        Add
                                    </button>
                                </div>
                                <div id="category-error" class="text-xs text-red-500"></div>
                                <div id="cat-loading" class="htmx-indicator text-xs text-gray-400">Adding...</div>
                                <div id="category-input-reset" x-effect="showCategory = false"></div>
                            </div>
                        </div>

                        <div>
                            <label class="text-xs text-gray-500 mb-1 block">Task</label>
                            <input x-ref="title" type="text" name="title" placeholder="Enter task..." required
                                class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>

                        <div>
                            <label class="text-xs text-gray-500 mb-1 block">Due date</label>
                            <input type="date" name="due_date"
                                class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>

                        <div class="flex justify-end gap-2 pt-2">

                            <button type="button" @click="open = false"
                                class="px-4 py-2 text-sm rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-100">
                                Cancel
                            </button>

                            <button type="submit" x-ref="submitBtn" class="px-4 py-2 text-sm rounded-lg text-white
                                bg-gradient-to-r from-[#ff7e6b] to-[#ffb199]
                                hover:shadow-md hover:scale-[1.02] transition-all
                                disabled:opacity-50 disabled:cursor-not-allowed">
                                Add Task
                            </button>

                        </div>

                    </form>

                </div>
            </div>
        </div>
        <div class="flex gap-3 mb-4">
            <button @click="filter='all'; activeCategory = null"
                :class="filter === 'all' && !activeCategory ? 'bg-gradient-to-br from-[#ff7e6b] to-[#ffb199] border-none shadow-md text-white' : ''"
                class="px-3 py-1.5 rounded-lg text-sm font-medium border text-gray-600 hover:bg-white hover:shadow-sm hover:text-gray-800 active:scale-95 transition-all duration-200 "
                hx-get="/?filter=all" hx-target="#task-container">
                All
            </button>
            <button @click="filter='active'; activeCategory = null"
                :class="filter === 'active' && !activeCategory ? 'bg-gradient-to-br from-[#ff7e6b] to-[#ffb199] border-none shadow-md text-white' : ''"
                class="px-3 py-1.5 rounded-lg text-sm font-medium border text-gray-600 hover:bg-white hover:shadow-sm hover:text-gray-800 active:scale-95 transition-all duration-200 "
                hx-get="/?filter=active" hx-target="#task-container">
                Active
            </button>
            <button @click="filter='completed'; activeCategory = null"
                :class="filter === 'completed' && !activeCategory ? 'bg-gradient-to-br from-[#ff7e6b] to-[#ffb199] border-none shadow-md text-white' : ''"
                class="px-3 py-1.5 rounded-lg text-sm font-medium border text-gray-600 hover:bg-white hover:shadow-sm hover:text-gray-800 active:scale-95 transition-all duration-200 "
                hx-get="/?filter=completed" hx-target="#task-container">
                Done
            </button>
        </div>
        <div id="loading" class="hidden mb-3">
            <div class="w-5 h-5 border-2 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <div id="task-container" class="space-y-3">
            {% include "todo_app/partials/task_list.html" %}
        </div>
    </div>
</div>

{% endblock %}
