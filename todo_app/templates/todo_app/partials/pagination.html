<div class="flex justify-between items-center mt-4">

    {% if tasks.has_previous %}
    <button class="px-4 py-2 rounded-lg text-sm font-medium 
        bg-white text-gray-700 border border-gray-200
        hover:bg-gray-50 hover:shadow-md hover:border-gray-300
        active:scale-95 active:bg-gray-100
        transition-all duration-200" hx-get="?page={{ tasks.previous_page_number }}&filter={{ filter }}"
        hx-target="#task-container" hx-swap="innerHTML">
        <i class="fas fa-chevron-left"></i> Prev
    </button>
    {% else %}
    <span></span>
    {% endif %}

    <span class="text-sm text-gray-500">
        Page {{ tasks.number }} of {{ tasks.paginator.num_pages }}
    </span>

    {% if tasks.has_next %}
    <button class="px-4 py-2 rounded-lg text-sm font-medium 
        bg-white text-gray-700 border border-gray-200
        hover:bg-gray-50 hover:shadow-md hover:border-gray-300
        active:scale-95 active:bg-gray-100
        transition-all duration-200" hx-get="?page={{ tasks.next_page_number }}&filter={{ filter }}"
        hx-target="#task-container" hx-swap="innerHTML">
        Next <i class="fas fa-chevron-right"></i>
    </button>
    {% else %}
    <span></span>
    {% endif %}

</div>
