<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    {% load static %}

    <title>{% block title %}Todo App{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/heroicons@2.0.18/dist/heroicons.min.js"></script>

</head>

<body class="bg-gray-100" x-data="{ showModal: false, deleteUrl: '' }">

    {% block content %}
    {% endblock %}


    <div x-show="showModal" x-transition
        class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-40 z-50">

        <div class="bg-white p-6 rounded-lg shadow-lg w-80">

            <h2 class="text-lg font-semibold mb-4">
                Confirm Delete
            </h2>

            <p class="text-gray-600 mb-6">
                Are you sure you want to delete this category?
            </p>

            <div class="flex justify-end gap-3">
                <button class="px-3 py-1 border rounded" @click="showModal = false">
                    Cancel
                </button>
                <button class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600" @click="
                    fetch(deleteUrl, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                        }
                    }).then(() => {
                        showModal = false;
                        htmx.ajax('GET', '/categories/', '#category-list');
                    })
                ">
                    Delete
                </button>
            </div>
        </div>
    </div>

    <div x-data="{ show: false, message: '', type: 'info' }" x-show="show" x-transition @show-toast.window="
        message = $event.detail.message;
        type = $event.detail.type || 'info';
        show = true;
        setTimeout(() => show = false, 2500);" 
        class="fixed inset-0 flex items-center justify-center z-50 pointer-events-none backdrop-blur-[1px]">
        <div :class="{
            'bg-green-500': type === 'success',
            'bg-red-500': type === 'error',
            'bg-blue-500': type === 'info'
        }" class="flex items-center gap-3 text-white px-6 py-3 rounded-lg shadow-lg text-sm 
        animate-fade-in pointer-events-auto">
            <i :class="{
                'fa-solid fa-circle-check': type === 'success',
                'fa-solid fa-circle-xmark': type === 'error',
                'fa-solid fa-circle-info': type === 'info'
            }" class="text-base"></i>

            <span x-text="message"></span>
        </div>
    </div>

    <script>
        document.body.addEventListener('htmx:configRequest', function (event) {
            console.log("HTMX Request:", event.detail);
            const token = document.querySelector('[name=csrfmiddlewaretoken]');
            if (token) {
                event.detail.headers['X-CSRFToken'] = token.value;
            }
        });
    </script>
</body>

</html>
