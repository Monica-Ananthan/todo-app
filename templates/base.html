<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">

    <title>{% block title %}Todo App{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../static/style.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/heroicons@2.0.18/dist/heroicons.min.js"></script>

    {% load static %}
</head>

<body class="bg-gray-100" x-data="{ showModal: false, deleteUrl: '' }">

    {% block content %}
    {% endblock %}


    <div x-show="showModal" x-transition
        class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-40 z-50">

        <div class="bg-white p-6 rounded-lg shadow-lg w-80">

            <h2 class="text-lg font-semibold mb-4">
                Confirm Delete
            </h2>

            <p class="text-gray-600 mb-6">
                Are you sure you want to delete this category?
            </p>

            <div class="flex justify-end gap-3">
                <button class="px-3 py-1 border rounded" @click="showModal = false">
                    Cancel
                </button>
                <button class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600" @click="
                    fetch(deleteUrl, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                        }
                    }).then(() => {
                        showModal = false;
                        htmx.ajax('GET', '/categories/', '#category-list');
                    })
                ">
                    Delete
                </button>
            </div>
        </div>
    </div>

    <div x-data="{ show: false, message: '' }" 
        @show-toast.window="
            message = $event.detail.message;
            show = true;
            setTimeout(() => show = false, 2000);
        " 
        class="fixed top-5 center z-[9999]">

        <div x-show="show" x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-3" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0 translate-y-3"
            class="bg-gray-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg">
            <span x-text="message"></span>
        </div>
    </div>



    <script>
        document.body.addEventListener('htmx:configRequest', function (event) {
            console.log("HTMX Request:", event.detail);
            const token = document.querySelector('[name=csrfmiddlewaretoken]');
            if (token) {
                event.detail.headers['X-CSRFToken'] = token.value;
            }
        });
    </script>
</body>

</html>
